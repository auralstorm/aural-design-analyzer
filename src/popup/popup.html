<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Aural Design Analyzer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header__top">
        <h1 class="header__title">Aural Design Analyzer</h1>
        <select class="lang-switch" id="langSwitch" title="语言/Language">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </div>
      <p class="header__subtitle" id="pageUrl"></p>
    </header>

    <!-- 未分析状态 -->
    <section class="state state--idle" id="stateIdle">
      <div class="state__icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2" stroke-dasharray="4 4"/>
          <path d="M24 14v10l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="state__text" id="idleText">点击下方按钮分析当前页面的设计语言</p>
      <p class="state__text state__text--stale hidden" id="staleWarning">缓存结果来自不同页面，建议重新分析</p>
      <button class="btn btn--primary" id="btnAnalyze">分析当前页面</button>
    </section>

    <!-- 分析中状态 -->
    <section class="state state--loading hidden" id="stateLoading">
      <div class="loader">
        <div class="loader__spinner"></div>
      </div>
      <p class="state__step" id="progressText">正在分析...</p>
      <div class="progress-bar">
        <div class="progress-bar__fill" id="progressBar"></div>
      </div>
      <p class="state__percent" id="progressPercent">0%</p>
    </section>

    <!-- 分析结果 -->
    <section class="state state--results hidden" id="stateResults">
      <!-- 颜色色板 -->
      <div class="section" id="sectionColors">
        <h2 class="section__title">颜色体系</h2>
        <div class="color-palette" id="colorPalette"></div>
      </div>

      <!-- 排版预览 -->
      <div class="section" id="sectionTypography">
        <h2 class="section__title">排版系统</h2>
        <div class="typography-preview" id="typographyPreview"></div>
      </div>

      <!-- 间距 -->
      <div class="section" id="sectionSpacing">
        <h2 class="section__title">间距规范</h2>
        <div class="spacing-preview" id="spacingPreview"></div>
      </div>

      <!-- 视觉效果预览 -->
      <div class="section hidden" id="sectionEffects">
        <h2 class="section__title">视觉效果</h2>
        <div class="effects-preview" id="effectsPreview"></div>
      </div>

      <!-- 结构概览 -->
      <div class="section" id="sectionStructure">
        <h2 class="section__title">页面结构</h2>
        <div class="structure-preview" id="structurePreview"></div>
      </div>

      <!-- 组件预览 -->
      <div class="section hidden" id="sectionComponents">
        <h2 class="section__title">组件规范</h2>
        <div class="components-preview" id="componentsPreview"></div>
      </div>

      <!-- 可访问性 -->
      <div class="section hidden" id="sectionAccessibility">
        <h2 class="section__title">可访问性</h2>
        <div class="accessibility-preview" id="accessibilityPreview"></div>
      </div>

      <!-- CSS 变量 -->
      <div class="section hidden" id="sectionCSSVariables">
        <h2 class="section__title">设计令牌 (CSS 变量)</h2>
        <div class="css-variables-preview" id="cssVariablesPreview"></div>
      </div>

      <!-- 分节选择 -->
      <div class="section section--config">
        <div class="section__header">
          <h2 class="section__title">Prompt 内容选择</h2>
          <div class="checklist-toggle">
            <a href="#" id="btnSelectAll">全选</a>
            <span class="checklist-toggle__sep">|</span>
            <a href="#" id="btnDeselectAll">取消全选</a>
          </div>
        </div>
        <div class="checklist" id="sectionChecklist"></div>
      </div>

      <!-- 操作栏 -->
      <div class="actions">
        <button class="btn btn--primary" id="btnCopy" disabled>复制 Prompt</button>
        <button class="btn btn--secondary" id="btnPreview">预览</button>
        <button class="btn btn--secondary" id="btnReanalyze">重新分析</button>
      </div>

      <!-- 导出栏 -->
      <div class="actions actions--export">
        <button class="btn btn--secondary btn--sm" id="btnDownloadMd">下载 .md</button>
        <button class="btn btn--secondary btn--sm" id="btnExportJSON">导出 JSON</button>
        <button class="btn btn--secondary btn--sm" id="btnExportCSS">导出 CSS</button>
      </div>

      <!-- Prompt 预览 -->
      <div class="prompt-preview hidden" id="promptPreview">
        <pre class="prompt-preview__content" id="promptPreviewContent"></pre>
      </div>
    </section>

    <!-- 错误状态 -->
    <section class="state state--error hidden" id="stateError">
      <p class="state__text state__text--error" id="errorText">分析出错</p>
      <button class="btn btn--secondary" id="btnRetry">重试</button>
    </section>
  </div>

  <script src="prompt-generator.js"></script>
  <script src="popup.js"></script>
</body>
</html>
